<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-1">Selamat Datang</h2>
          <p class="text-muted mb-0">Silakan masuk ke akun Anda</p>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="text"
                class="form-control"
                id="username"
                placeholder="Masukkan username"
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Masukkan password"
              />
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">Ingat saya</label>
            </div>
            <a href="lpw.html" class="forgot-link">Lupa password?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Masuk</button>

          <div class="text-center">
            <span class="text-muted">Belum punya akun?</span>
            <a href="crakun.html" class="ms-1 create-account">Buat akun</a>
          </div>
        </form>
      </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Informasi</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="loginMessage"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
      const loginForm = document.getElementById('loginForm');
      const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
      const loginMessage = document.getElementById('loginMessage');

      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          loginMessage.textContent = 'Username dan password wajib diisi.';
          loginModal.show();
          return;
        }

        const users = JSON.parse(localStorage.getItem('fakeUsers') || '[]');
        const user = users.find(
          (item) => item.username === username && item.password === password
        );

        if (user) {
          localStorage.setItem('loggedInUser', username);
          loginMessage.textContent = 'Login berhasil! Selamat datang kembali.';
          loginModal.show();

          const modalElement = document.getElementById('loginModal');
          modalElement.addEventListener(
            'hidden.bs.modal',
            function () {
              window.location.href = 'warkop.html';
            },
            { once: true }
          );
        } else {
          loginMessage.textContent = 'Username atau password salah.';
          loginModal.show();
        }
      });
    </script>
  </body>
</html>
